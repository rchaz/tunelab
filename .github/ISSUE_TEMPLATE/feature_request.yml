name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues for duplicates
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skills (tune-decide, tune-data, tune-train, tune-eval, tune-loop)
        - Concepts / explainers
        - Recipes / examples
        - Testing
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What use case does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
